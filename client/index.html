<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dungeon Crawler</title>

  <style>
    /* ===== BASE PAGE ===== */
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial;
      overflow: hidden; /* empêche scroll */
      user-select: none; /* empêche sélection texte */
    }

    .game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #111;  /* ← même couleur que le fond */
      gap: 0;
    }

    h1 {
      margin: 0;
      padding: 8px 0;
    }

    canvas {
      outline: none;
      user-select: none;
      display: block;
    }

    /* ===== FUTUR UI (placeholder) ===== */
    #ui {
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <div class="game-container">

    <h1>Dungeon Crawler</h1>

    <canvas id="gameCanvas" tabindex="0"></canvas>

    <div id="ui">
      Déplacement : flèches directionnelles
    </div>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="js/main.js"></script>

</body>

</body>
</html>
